task_plot_spec:
  spec_version: '0.2'
  meta:
    task_name: Fixed-ratio Satiation Schedule
    mode: existing
    task_id: ''
  figure:
    output:
      filename: task_flow.png
      dpi: 300
      width_in: 16.0
      background: white
    layout:
      max_conditions: 3
      screens_per_timeline: 5
      screen_overlap_ratio: 0.1
      screen_slope: 0.08
      screen_slope_deg: 25.0
      timeline_gap: 0.18
      screen_aspect_ratio: 1.4545454545454546
      left_margin: 0.2
      right_margin: 0.03
      top_margin: 0.03
      bottom_margin: 0.05
      condition_label_gap: 0.014
      phase_label_pad: 0.01
      duration_label_gap: 0.006
      timeline_arrow_gap: 0.01
      timeline_arrow_screen_clearance: 0.007
      timeline_arrow_text_clearance: 0.01
      timeline_arrow_extra_per_screen: 0.015
      timeline_arrow_min_y: 0.02
      timeline_arrow_max_y: 0.96
  timelines:
  - condition: fr5
    display_condition_label: Fr5
    phases:
    - phase_name: work preview
      display_phase_label: Work Preview
      duration_ms:
        fixed: 600
      response_window_ms: null
      display_timing_label: 600 ms
      stim_ids:
      - work_prompt
      - work_counter
      - satiety_text
      - fixation
      stimulus_example:
        summary: 本轮固定比率要求：连续按空格 … 次 + 已按 …/… 次 + 饱腹指数：… + +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: 本轮固定比率要求：连续按空格 … 次
          color: white
          pos:
          - 0.0
          - 120.0
          height: 30.0
        - kind: text
          text: 已按 …/… 次
          color: white
          pos:
          - 0.0
          - 20.0
          height: 32.0
        - kind: text
          text: 饱腹指数：…
          color: '#f2f2f2'
          pos:
          - 0.0
          - -84.0
          height: 26.0
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - -120.0
          height: 44.0
      notes: ''
    - phase_name: reward_text
      display_phase_label: Reward Text
      duration_ms:
        fixed: 900
      response_window_ms: null
      display_timing_label: 900 ms
      stim_ids:
      - reward_text
      - reward_token
      - satiety_text
      stimulus_example:
        summary: 奖励已发放：+… 个代币 + Circle + 饱腹指数：…
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: 奖励已发放：+… 个代币
          color: white
          pos:
          - 0.0
          - -118.0
          height: 30.0
        - kind: shape
          shape: circle
          label: Circle
          color: '#f8e296'
          line_color: '#f8e296'
          line_width: 1.0
          pos:
          - 0.0
          - 22.0
          size: 1.2352941176470589
        - kind: text
          text: 饱腹指数：…
          color: '#f2f2f2'
          pos:
          - 0.0
          - -84.0
          height: 26.0
      notes: inferred from show() without set_trial_context
    - phase_name: satiety_text
      display_phase_label: Satiety Text
      duration_ms:
        fixed: 1200
      response_window_ms: null
      display_timing_label: 1200 ms
      stim_ids:
      - satiety_text
      - fixation
      stimulus_example:
        summary: 饱腹指数：… + +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: 饱腹指数：…
          color: '#f2f2f2'
          pos:
          - 0.0
          - -84.0
          height: 26.0
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - -120.0
          height: 44.0
      notes: inferred from show() without set_trial_context
    - phase_name: timeout_text
      display_phase_label: Timeout Text
      duration_ms:
        fixed: 900
      response_window_ms: null
      display_timing_label: 900 ms
      stim_ids:
      - timeout_text
      - fixation
      stimulus_example:
        summary: 本轮超时，未获得代币 + +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: 本轮超时，未获得代币
          color: '#ffd8a5'
          pos:
          - 0.0
          - -118.0
          height: 30.0
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - -120.0
          height: 44.0
      notes: inferred from show() without set_trial_context
    - phase_name: fixation
      display_phase_label: Fixation
      duration_ms:
        fixed: 800
      response_window_ms: null
      display_timing_label: 800 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - -120.0
          height: 44.0
      notes: inferred from show() without set_trial_context
    condition_variants:
    - fr10
    - fr20
    display_condition_note: 'Also: Fr10, Fr20'
  legend: []
