subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3

subinfo_mapping:
  subject_id: 被试编号（3位）
  Participant Information: 参与者信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: '{field} 输入无效'

window:
  size: [1280, 720]
  units: pix
  screen: 0
  bg_color: black
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60

task:
  task_name: fixed_ratio_satiation_schedule
  save_path: ./outputs/sim_sampler
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  seed_mode: same_across_sub
  overall_seed: 41041
  block_seed:
    - 41041
  phase_order:
    - instruction
    - work
    - reward
    - satiation
    - iti
  total_blocks: 1
  total_trials: 3
  trial_per_block: 3
  conditions:
    - fr5
    - fr10
    - fr20
  condition_weights:
    fr5: 1
    fr10: 1
    fr20: 1
  key_list:
    - space
  response_key: space
  delta: 1
  ratio_requirements:
    fr5: 5
    fr10: 10
    fr20: 20
  satiation_limit: 12
  reward_tokens_per_completion: 1
  instruction_font: SimHei
  body_font: SimHei
  prompt_font: SimHei
  font_size_large: 34
  font_size_medium: 28
  font_size_small: 24
  prompt_y: 120
  counter_y: 18
  satiety_y: -84
  reward_token_y: 26
  reward_text_y: -118

timing:
  instruction_pause_duration: 0.1
  ready_duration: 3.0
  press_timeout: 1.2
  reward_duration: 0.9
  satiation_duration: 1.2
  iti_duration: 0.8
  block_break_duration: 3.0

stimuli:
  instruction_text:
    type: text
    font: SimHei
    text: |-
      你将进行一个固定比率按键任务。
      每一轮都需要连续按空格若干次，达到要求后才能获得 1 个代币。
      代币越多，屏幕上的饱腹指数越高。
      请尽量稳定、快速地完成每一轮。
      按空格开始。
    color: white
    height: 28
    wrapWidth: 1000
  block_ready:
    type: text
    font: SimHei
    text: |-
      第 {block_num}/{total_blocks} 组即将开始
      按空格继续
    color: white
    height: 30
    wrapWidth: 960
    pos: [0, 0]
  work_prompt:
    type: text
    font: SimHei
    text: |-
      本轮固定比率要求：连续按空格 {required_presses} 次
    color: white
    height: 30
    wrapWidth: 1000
    pos: [0, 120]
  work_counter:
    type: text
    font: SimHei
    text: |-
      已按 {current_press}/{required_presses} 次
    color: white
    height: 32
    wrapWidth: 900
    pos: [0, 20]
  fixation:
    type: text
    font: SimHei
    text: +
    color: white
    height: 44
    pos: [0, -120]
  satiety_text:
    type: text
    font: SimHei
    text: |-
      饱腹指数：{satiety_pct:.0%}
    color: [0.9, 0.9, 0.9]
    height: 26
    wrapWidth: 800
    pos: [0, -84]
  reward_token:
    type: circle
    radius: 42
    lineColor: [0.95, 0.78, 0.18]
    fillColor: [0.95, 0.78, 0.18]
    pos: [0, 22]
  reward_text:
    type: text
    font: SimHei
    text: |-
      奖励已发放：+{reward_tokens} 个代币
    color: white
    height: 30
    wrapWidth: 900
    pos: [0, -118]
  timeout_text:
    type: text
    font: SimHei
    text: |-
      本轮超时，未获得代币
    color: [1.0, 0.7, 0.3]
    height: 30
    wrapWidth: 900
    pos: [0, -118]
  block_break:
    type: text
    font: SimHei
    text: |-
      第 {block_num}/{total_blocks} 组完成
      完成率：{block_completion_rate:.1%}
      平均完成用时：{mean_completion_ms:.0f} ms
      累计代币：{total_tokens}

      准备好后按空格继续
    color: white
    height: 26
    wrapWidth: 980
    pos: [0, 0]
  good_bye:
    type: text
    font: SimHei
    text: |-
      任务结束
      总完成率：{total_completion_rate:.1%}
      累计代币：{total_tokens}
      平均完成用时：{mean_completion_ms:.0f} ms

      按空格退出
    color: white
    height: 28
    wrapWidth: 980
    pos: [0, 0]

triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    trial_onset: 20
    press_onset: 21
    press_response: 22
    press_timeout: 23
    reward_onset: 30
    satiation_onset: 31
    iti_onset: 40
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
    timeout: 1
    prefix: [1, 225, 1, 0]
  policy:
    strict: false
  timing:
    post_delay_s: 0.001

sim:
  output_dir: outputs/sim_sampler
  seed: 0
  participant_id: sim001
  session_id: sub-sim001-sampler
  log_path: outputs/sim_sampler/sub-sim001_sampler_sim_events.jsonl
  policy: warn
  default_rt_s: 0.08
  clamp_rt: false
  responder:
    type: responders.task_sampler:TaskSamplerResponder
    kwargs:
      continue_key: space
      rt_continue_s: 0.08
